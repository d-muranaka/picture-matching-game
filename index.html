<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>絵合わせゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(10px, 5vw, 40px);
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: clamp(15px, 6vw, 40px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: clamp(15px, 4vw, 30px);
            font-size: clamp(20px, 6vw, 40px);
            word-break: break-word;
        }

        .info-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(15px, 4vw, 30px);
            background: #f8f9fa;
            padding: clamp(10px, 3vw, 20px);
            border-radius: 10px;
            gap: clamp(10px, 3vw, 30px);
            flex-wrap: wrap;
        }

        .info-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        .info-label {
            color: #666;
            font-size: clamp(10px, 2vw, 14px);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: clamp(16px, 4vw, 32px);
            font-weight: bold;
        }

        .info-value.mistakes {
            color: #e74c3c;
        }

        .info-value.matched {
            color: #27ae60;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(6px, 2vw, 15px);
            margin-bottom: clamp(20px, 5vw, 40px);
            perspective: 1000px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            aspect-ratio: 1 / 1;
            background: #667eea;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(24px, 8vw, 50px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 5px;
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .card:active:not(.flipped):not(.matched) {
            transform: translateY(-2px);
        }

        .card.flipped {
            background: #f39c12;
        }

        .card.matched {
            background: #27ae60;
            cursor: default;
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .button-group {
            display: flex;
            gap: clamp(8px, 3vw, 20px);
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: clamp(10px, 2.5vw, 16px) clamp(20px, 5vw, 40px);
            font-size: clamp(14px, 3vw, 18px);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .reset-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: clamp(25px, 6vw, 50px);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            font-size: clamp(24px, 5vw, 40px);
            margin-bottom: clamp(10px, 3vw, 20px);
            word-break: break-word;
        }

        .modal-content.win h2 {
            color: #27ae60;
        }

        .modal-content.lose h2 {
            color: #e74c3c;
        }

        .modal-content p {
            color: #666;
            margin-bottom: clamp(15px, 4vw, 30px);
            font-size: clamp(14px, 2.5vw, 18px);
            word-break: break-word;
        }

        .modal-content button {
            padding: clamp(10px, 2.5vw, 16px) clamp(20px, 5vw, 40px);
            font-size: clamp(14px, 3vw, 18px);
            background: #667eea;
            color: white;
        }

        .modal-content button:hover {
            background: #5568d3;
        }

        /* ===== レスポンシブブレークポイント ===== */

        /* 超小型デバイス (〜320px) */
        @media (max-width: 320px) {
            .game-board {
                gap: 5px;
            }
            .card {
                font-size: 20px;
            }
        }

        /* 小型デバイス (321px 〜 480px) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 12px;
                border-radius: 12px;
            }

            h1 {
                margin-bottom: 12px;
                font-size: 22px;
            }

            .info-section {
                flex-direction: column;
                gap: 8px;
                margin-bottom: 15px;
                padding: 10px;
            }

            .info-item {
                width: 100%;
                min-width: unset;
            }

            .info-label {
                font-size: 11px;
            }

            .info-value {
                font-size: 18px;
            }

            .game-board {
                gap: 6px;
                margin-bottom: 15px;
            }

            .card {
                font-size: 24px;
                border-radius: 8px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .modal-content {
                padding: 25px;
            }

            .modal-content h2 {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .modal-content p {
                font-size: 14px;
                margin-bottom: 15px;
            }
        }

        /* 中型デバイス (481px 〜 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 18px;
            }

            .info-section {
                padding: 12px;
                margin-bottom: 20px;
            }

            .info-label {
                font-size: 12px;
            }

            .info-value {
                font-size: 22px;
            }

            .game-board {
                gap: 8px;
                margin-bottom: 20px;
            }

            .card {
                font-size: 32px;
            }

            button {
                padding: 12px 28px;
                font-size: 16px;
            }

            .modal-content {
                padding: 35px;
            }

            .modal-content h2 {
                font-size: 32px;
                margin-bottom: 15px;
            }

            .modal-content p {
                font-size: 16px;
            }
        }

        /* 大型デバイス (769px 〜 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 36px;
                margin-bottom: 24px;
            }

            .info-value {
                font-size: 28px;
            }

            .card {
                font-size: 44px;
            }

            button {
                padding: 14px 32px;
                font-size: 17px;
            }

            .modal-content {
                padding: 45px;
            }

            .modal-content h2 {
                font-size: 38px;
            }

            .modal-content p {
                font-size: 18px;
            }
        }

        /* 超大型デバイス (1025px 〜) */
        @media (min-width: 1025px) {
            .container {
                padding: 40px;
            }

            h1 {
                font-size: 42px;
                margin-bottom: 30px;
            }

            .info-section {
                padding: 20px;
                margin-bottom: 30px;
            }

            .info-value {
                font-size: 32px;
            }

            .game-board {
                gap: 15px;
                margin-bottom: 40px;
            }

            .card {
                font-size: 52px;
            }

            button {
                padding: 16px 40px;
                font-size: 18px;
            }

            .modal-content {
                padding: 50px;
            }

            .modal-content h2 {
                font-size: 44px;
            }

            .modal-content p {
                font-size: 20px;
            }
        }

        /* タッチデバイス対応（hover無効化） */
        @media (hover: none) and (pointer: coarse) {
            .card:active:not(.flipped):not(.matched) {
                transform: scale(0.95);
            }

            button:active {
                opacity: 0.8;
            }
        }

        /* 横向きモード (タブレット/スマートフォン横向き) */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 5px;
            }

            .container {
                padding: 10px;
                max-height: 98vh;
            }

            h1 {
                margin-bottom: 8px;
                font-size: 18px;
            }

            .info-section {
                margin-bottom: 10px;
                padding: 8px;
                gap: 8px;
            }

            .info-label {
                font-size: 9px;
            }

            .info-value {
                font-size: 16px;
            }

            .game-board {
                margin-bottom: 12px;
                gap: 5px;
            }

            .card {
                font-size: 22px;
            }

            button {
                padding: 8px 16px;
                font-size: 13px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-content h2 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .modal-content p {
                font-size: 13px;
                margin-bottom: 12px;
            }

            .modal-content button {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        /* フォーカス スタイル（アクセシビリティ） */
        button:focus-visible {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .card:focus-visible {
            outline: 3px solid #f39c12;
            outline-offset: 2px;
        }

        /* 高コントラスト モード対応 */
        @media (prefers-contrast: more) {
            .card {
                border: 2px solid rgba(0, 0, 0, 0.3);
            }

            .info-section {
                border: 1px solid #999;
            }
        }

        /* 減速アニメーション対応 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 絵合わせゲーム</h1>
        
        <div class="info-section">
            <div class="info-item">
                <div class="info-label">マッチ数</div>
                <div class="info-value matched" id="matchedCount">0 / 8</div>
            </div>
            <div class="info-item">
                <div class="info-label">ミス</div>
                <div class="info-value mistakes" id="mistakeCount">0 / 3</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="button-group">
            <button class="reset-btn" onclick="resetGame()">🔄 リセット</button>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content" id="modalContent">
            <h2></h2>
            <p></p>
            <button onclick="resetGame()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const EMOJI_PATTERNS = ['🌟', '🎨', '🎭', '🎪', '🎸', '🎬', '🎲', '🎯'];
        const CARD_COUNT = 16;
        const PAIR_COUNT = 8;
        const MAX_MISTAKES = 3;

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let mistakes = 0;
        let isProcessing = false;
        let gameOver = false;

        /**
         * ゲームを初期化する
         */
        function initGame() {
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            mistakes = 0;
            isProcessing = false;
            gameOver = false;
            
            // カードを作成（各絵柄を2枚）
            EMOJI_PATTERNS.forEach(emoji => {
                cards.push({ emoji, matched: false });
                cards.push({ emoji, matched: false });
            });

            // カードをシャッフル
            shuffleCards();

            // UIを更新
            renderBoard();
            updateUI();

            // モーダルを非表示
            document.getElementById('gameOverModal').classList.remove('show');
        }

        /**
         * Fisher-Yatesアルゴリズムでカードをシャッフル
         */
        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
        }

        /**
         * ゲームボードをレンダリング
         */
        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            cards.forEach((card, index) => {
                const cardElement = document.createElement('button');
                cardElement.className = 'card';
                
                if (card.matched) {
                    cardElement.classList.add('matched');
                    cardElement.textContent = card.emoji;
                } else if (flippedCards.find(f => f.index === index)) {
                    cardElement.classList.add('flipped');
                    cardElement.textContent = card.emoji;
                } else {
                    cardElement.textContent = '?';
                }

                cardElement.onclick = () => flipCard(index, cardElement);
                gameBoard.appendChild(cardElement);
            });
        }

        /**
         * カードをめくる
         */
        function flipCard(index, cardElement) {
            // ゲームが終了している、処理中、既にめくられている、またはマッチ済みの場合は無視
            if (gameOver || isProcessing || flippedCards.find(f => f.index === index) || cards[index].matched) {
                return;
            }

            // めくられたカードを記録
            flippedCards.push({ index, emoji: cards[index].emoji });
            renderBoard();

            // 2枚めくられたかをチェック
            if (flippedCards.length === 2) {
                isProcessing = true;
                checkMatch();
            }
        }

        /**
         * マッチを確認
         */
        function checkMatch() {
            setTimeout(() => {
                const [first, second] = flippedCards;

                if (first.emoji === second.emoji) {
                    // マッチした
                    cards[first.index].matched = true;
                    cards[second.index].matched = true;
                    matchedPairs++;

                    flippedCards = [];
                    isProcessing = false;
                    updateUI();

                    // ゲームクリアをチェック
                    if (matchedPairs === PAIR_COUNT) {
                        endGame(true);
                    }

                    renderBoard();
                } else {
                    // マッチしなかった
                    mistakes++;
                    updateUI();

                    // ゲームオーバーをチェック
                    if (mistakes >= MAX_MISTAKES) {
                        endGame(false);
                    }

                    // カードを元に戻す
                    setTimeout(() => {
                        flippedCards = [];
                        isProcessing = false;
                        renderBoard();
                    }, 1000);
                }
            }, 800);
        }

        /**
         * UIを更新
         */
        function updateUI() {
            document.getElementById('matchedCount').textContent = `${matchedPairs} / ${PAIR_COUNT}`;
            document.getElementById('mistakeCount').textContent = `${mistakes} / ${MAX_MISTAKES}`;
        }

        /**
         * ゲーム終了
         */
        function endGame(isWin) {
            gameOver = true;
            const modal = document.getElementById('gameOverModal');
            const modalContent = document.getElementById('modalContent');

            if (isWin) {
                modalContent.classList.add('win');
                modalContent.classList.remove('lose');
                modalContent.querySelector('h2').textContent = '🎉 ゲーム成功！';
                modalContent.querySelector('p').textContent = `全てのペアを見つけました！ミス: ${mistakes}/3`;
            } else {
                modalContent.classList.add('lose');
                modalContent.classList.remove('win');
                modalContent.querySelector('h2').textContent = '😢 ゲームオーバー';
                modalContent.querySelector('p').textContent = `ミスが3回になりました。マッチ数: ${matchedPairs}/8`;
            }

            modal.classList.add('show');
        }

        /**
         * ゲームをリセット
         */
        function resetGame() {
            initGame();
        }

        // ゲーム開始
        initGame();
    </script>
</body>
</html>
